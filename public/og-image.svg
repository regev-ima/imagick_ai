<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="Inter, system-ui, Arial, sans-serif">
  <defs>
    <radialGradient id="glow" cx="78%" cy="22%" r="60%">
      <stop offset="0%" stop-color="#2B50F0" stop-opacity="0.55"/>
      <stop offset="45%" stop-color="#2B50F0" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#2B50F0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3A63FF"/>
      <stop offset="100%" stop-color="#2B50F0"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#33343A" stroke-opacity="0.35" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Canvas -->
  <rect width="1200" height="630" fill="#16171A"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect x="0" y="0" width="1200" height="6" fill="url(#ink)"/>

  <!-- Brand lockup -->
  <g transform="translate(90, 96)">
    <rect x="0" y="0" width="44" height="44" rx="11" fill="none" stroke="#2B50F0" stroke-width="3"/>
    <path d="M30 6 C31.6 13 36 17.4 43 19 C36 20.6 31.6 25 30 32 C28.4 25 24 20.6 17 19 C24 17.4 28.4 13 30 6 Z" fill="#3A63FF"/>
    <text x="62" y="32" font-size="30" font-weight="700" fill="#E8E9ED" letter-spacing="-0.5">imagick<tspan fill="#2B50F0">.ai</tspan></text>
  </g>

  <!-- Headline -->
  <g transform="translate(90, 250)">
    <text font-size="84" font-weight="800" letter-spacing="-3" fill="#E8E9ED">
      <tspan x="0" y="0">Your editing.</tspan>
      <tspan x="0" y="96">Your AI. <tspan fill="#3A63FF">Zero presets.</tspan></tspan>
    </text>
  </g>

  <!-- Subhead -->
  <text x="90" y="470" font-size="30" font-weight="500" fill="#8A8C94">
    Train AI on your style and edit a whole shoot in seconds.
  </text>

  <!-- Stat chips -->
  <g transform="translate(90, 520)" font-family="'Roboto Mono', ui-monospace, monospace">
    <g>
      <rect x="0" y="0" width="220" height="56" rx="8" fill="#1F2024" stroke="#33343A"/>
      <text x="20" y="36" font-size="26" font-weight="700" fill="#E8E9ED">90%<tspan font-size="14" font-weight="500" fill="#8A8C94"> faster culling</tspan></text>
    </g>
    <g transform="translate(240,0)">
      <rect x="0" y="0" width="210" height="56" rx="8" fill="#1F2024" stroke="#33343A"/>
      <text x="20" y="36" font-size="26" font-weight="700" fill="#E8E9ED">10+<tspan font-size="14" font-weight="500" fill="#8A8C94"> hrs / week</tspan></text>
    </g>
    <g transform="translate(470,0)">
      <rect x="0" y="0" width="250" height="56" rx="8" fill="#1F2024" stroke="#33343A"/>
      <text x="20" y="36" font-size="26" font-weight="700" fill="#E8E9ED">10k+<tspan font-size="14" font-weight="500" fill="#8A8C94"> photographers</tspan></text>
    </g>
  </g>

  <!-- Decorative sparkle, top-right -->
  <path transform="translate(1040, 150) scale(3.4)" d="M12 0 C12.9 7.2 16.8 11.1 24 12 C16.8 12.9 12.9 16.8 12 24 C11.1 16.8 7.2 12.9 0 12 C7.2 11.1 11.1 7.2 12 0 Z" fill="#3A63FF" fill-opacity="0.9"/>
  <path transform="translate(980, 360) scale(1.6)" d="M12 0 C12.9 7.2 16.8 11.1 24 12 C16.8 12.9 12.9 16.8 12 24 C11.1 16.8 7.2 12.9 0 12 C7.2 11.1 11.1 7.2 12 0 Z" fill="#2B50F0" fill-opacity="0.6"/>
</svg>
