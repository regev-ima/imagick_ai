name: Supabase Deploy

on:
  push:
    branches: [main]
    paths:
      - 'supabase/**'
      - '.github/workflows/supabase-deploy.yml'
  workflow_dispatch:
    inputs:
      skip_migrations:
        description: 'Skip db push'
        type: boolean
        default: false
      skip_functions:
        description: 'Skip functions deploy'
        type: boolean
        default: false

concurrency:
  group: supabase-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Verify secrets are present
        run: |
          missing=()
          [ -n "$SUPABASE_ACCESS_TOKEN" ] || missing+=("SUPABASE_ACCESS_TOKEN")
          [ -n "$SUPABASE_DB_PASSWORD" ] || missing+=("SUPABASE_DB_PASSWORD")
          [ -n "$SUPABASE_PROJECT_ID" ] || missing+=("SUPABASE_PROJECT_ID")
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Missing repository secrets: ${missing[*]}"
            exit 1
          fi
          echo "SUPABASE_ACCESS_TOKEN length: ${#SUPABASE_ACCESS_TOKEN}"
          echo "SUPABASE_DB_PASSWORD length: ${#SUPABASE_DB_PASSWORD}"
          echo "SUPABASE_PROJECT_ID:         $SUPABASE_PROJECT_ID"

      - name: Link project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Push migrations
        if: ${{ inputs.skip_migrations != true }}
        run: supabase db push

      # --use-api uploads the function source through the Management API on
      # every run. The docker-bundling path's "No change found" skip once left
      # EVERY function pointing at a missing code blob (gateway 404
      # NOT_FOUND_FUNCTION_BLOB — a full production outage: uploads, emails and
      # Drive imports all dead), so we never use it again.
      - name: Deploy edge functions
        if: ${{ inputs.skip_functions != true }}
        run: supabase functions deploy --use-api --project-ref "$SUPABASE_PROJECT_ID"

      # Drive functions do their own Bearer-token / webhook-secret auth, so the
      # platform JWT gate must be OFF — otherwise it blocks the unauthenticated
      # CORS preflight (503/null execution) and breaks Google Drive imports.
      # gd-import is a fresh slug for the old gd-transfer (whose worker got stuck).
      - name: Force-disable JWT gate on Drive functions
        if: ${{ inputs.skip_functions != true }}
        run: |
          supabase functions deploy gd-import --use-api --no-verify-jwt --project-ref "$SUPABASE_PROJECT_ID"
          supabase functions deploy gd-transfer-webhook --use-api --no-verify-jwt --project-ref "$SUPABASE_PROJECT_ID"

      # Post-deploy smoke check: every browser-facing function must answer its
      # CORS preflight. Catches the missing-blob failure mode (404) before
      # users do.
      - name: Verify functions respond
        if: ${{ inputs.skip_functions != true }}
        run: |
          B="https://${SUPABASE_PROJECT_ID}.supabase.co/functions/v1"
          fail=0
          for fn in image-upload gd-import gd-transfer-webhook await-compression send-email image-webhook process-images process-pipeline extract-exif verify-gallery-password; do
            code=$(curl -s -o /dev/null -w "%{http_code}" -X OPTIONS "$B/$fn" \
              -H "Origin: https://app.imagick.ai" \
              -H "Access-Control-Request-Method: POST" \
              -H "Access-Control-Request-Headers: authorization,apikey,content-type" --max-time 20)
            echo "$fn OPTIONS=$code"
            if [ "$code" != "200" ] && [ "$code" != "204" ]; then fail=1; fi
          done
          exit $fail
