name: Deploy AI pipeline

# Automates the whole deploy: Modal GPU app + Supabase migration + edge function.
# You only add the secrets below once (Settings → Secrets and variables → Actions);
# then every change to the pipeline deploys itself. Run manually via "Run workflow".
#
# Required repository secrets:
#   MODAL_TOKEN_ID, MODAL_TOKEN_SECRET   - from modal.com (Settings → API Tokens)
#   PIPELINE_TOKEN                        - any long random string (shared Modal↔Supabase)
#   SUPABASE_ACCESS_TOKEN                 - supabase.com (Account → Access Tokens)
#   SUPABASE_PROJECT_ID                   - your project ref (e.g. abcdefgh...)
#   SUPABASE_DB_PASSWORD                  - the database password

# Runs automatically on changes to the pipeline (the secrets are set now), and
# can also be run manually. NOTE: the "Run workflow" button only appears once
# this file is on the default branch — until then, push triggers it.
on:
  workflow_dispatch:
  push:
    branches: [claude/image-scoring-tagging-0cszyi]
    paths:
      - "pipeline/**"
      - "supabase/functions/process-pipeline/**"
      - "supabase/migrations/**"
      - ".github/workflows/deploy-pipeline.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
      MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      # Authenticates setup-cli's GitHub API calls so it isn't rate-limited.
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Modal
        run: pip install modal

      - name: Create/refresh Modal pipeline secret
        run: |
          modal secret create imagick-pipeline-secret \
            PIPELINE_TOKEN="${{ secrets.PIPELINE_TOKEN }}" --force

      - name: Deploy Modal app
        id: modal
        run: |
          modal deploy pipeline/modal_app.py 2>&1 | tee modal_out.txt
          # Grab the PROCESS endpoint specifically — there are now multiple
          # endpoints (process + health), so we must not pick the wrong one.
          URL=$(grep -Eo 'https://[a-zA-Z0-9._-]+\.modal\.run[^ ]*' modal_out.txt | grep -i process | head -1)
          echo "Captured Modal URL: $URL"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          HURL=$(grep -Eo 'https://[a-zA-Z0-9._-]+\.modal\.run[^ ]*' modal_out.txt | grep -i health | head -1)
          echo "health=$HURL" >> "$GITHUB_OUTPUT"

      - name: Verify GPU (health check)
        run: |
          HURL="${{ steps.modal.outputs.health }}"
          echo "Health URL: $HURL"
          echo "Calling health (cold start + GPU probe, allow ~2 min)..."
          RESP=$(curl -sS --max-time 150 "$HURL" || echo '{"error":"curl failed"}')
          echo "Health response:"
          echo "$RESP"
          if echo "$RESP" | grep -q '"gpu_ok":true'; then
            echo "::notice::✅ Faces running on GPU"
          else
            echo "::warning::⚠️ Faces NOT on GPU yet"
          fi

      - name: Install Supabase CLI
        run: |
          # setup-cli@v1 hits GitHub's unauthenticated API and gets rate-limited;
          # fetch the release with an authenticated curl instead. The CLI ships as
          # two co-located binaries (supabase shim + supabase-go), so extract the
          # whole tarball into one dir and put it on PATH — don't move just the shim.
          JSON=$(curl -sSL -H "Authorization: Bearer $GITHUB_TOKEN" https://api.github.com/repos/supabase/cli/releases/latest)
          URL=$(echo "$JSON" | grep -oE 'https://[^"]*_linux_amd64\.tar\.gz' | head -1)
          echo "Supabase CLI asset: $URL"
          mkdir -p "$HOME/.local/share/supabase"
          curl -sSL "$URL" | tar -xzf - -C "$HOME/.local/share/supabase"
          echo "$HOME/.local/share/supabase" >> "$GITHUB_PATH"
          "$HOME/.local/share/supabase/supabase" --version

      - name: Link Supabase project
        run: supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_ID }}"

      - name: Push database migration
        run: supabase db push

      - name: Set edge-function secrets
        run: |
          supabase secrets set \
            MODAL_URL="${{ steps.modal.outputs.url }}" \
            MODAL_TOKEN="${{ secrets.PIPELINE_TOKEN }}" \
            --project-ref "${{ secrets.SUPABASE_PROJECT_ID }}"

      - name: Deploy edge function
        # --use-api bundles via the Management API instead of pulling a Docker
        # image locally, which avoids the flaky Docker Hub "toomanyrequests" pull.
        run: supabase functions deploy process-pipeline --use-api --project-ref "${{ secrets.SUPABASE_PROJECT_ID }}"

      - name: Summary
        run: |
          echo "### ✅ Pipeline deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "Modal URL: ${{ steps.modal.outputs.url }}" >> "$GITHUB_STEP_SUMMARY"
