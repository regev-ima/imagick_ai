# TEMPORARY diagnostic — probes edge-function preflight/GET statuses from a
# runner with open egress (the dev sandbox can't reach supabase.co). Used to
# diagnose the production "CORS preflight doesn't pass" failure on image-upload.
# Runs only when this file itself changes; delete after diagnosis.
name: Probe edge functions
on:
  push:
    branches: [claude/image-scoring-tagging-0cszyi]
    paths: ['.github/workflows/probe-edge.yml']
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Probe functions
        run: |
          B=https://zfcltfqgrhytpvgqkkfo.supabase.co/functions/v1
          for fn in image-upload process-pipeline gd-import send-email; do
            echo "===== $fn : OPTIONS (browser preflight simulation) ====="
            curl -s -o /dev/null -D - -X OPTIONS "$B/$fn" \
              -H "Origin: https://app.imagick.ai" \
              -H "Access-Control-Request-Method: POST" \
              -H "Access-Control-Request-Headers: authorization,apikey,content-type,x-client-info" \
              --max-time 20 | sed -n '1,12p'
            echo "===== $fn : GET without auth (gateway vs function 401) ====="
            curl -s -w "\nSTATUS=%{http_code}\n" "$B/$fn" --max-time 20 | head -4
            echo ""
          done
