# EMERGENCY one-shot — restore all edge functions in production.
#
# The bulk `supabase functions deploy` (docker bundling) run on main reported
# "No change found" for every function and skipped uploading their code, but
# left them pointing at a missing blob — the gateway now returns
# 404 NOT_FOUND_FUNCTION_BLOB for nearly every function (image-upload,
# gd-import, send-email, …). The ONLY healthy function is process-pipeline —
# the one deployed with --use-api in the same run. So: force a real re-upload
# of everything via --use-api (which always uploads, never "no change"-skips).
# Runs only when this file changes; delete after production is verified green.
name: Restore edge functions
on:
  push:
    branches: [claude/image-scoring-tagging-0cszyi]
    paths: ['.github/workflows/restore-functions.yml']
jobs:
  restore:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Redeploy ALL functions via API (forces real upload)
        run: supabase functions deploy --use-api --project-ref "${{ secrets.SUPABASE_PROJECT_ID }}"
      - name: Re-disable JWT gate on externally-called webhooks
        run: |
          supabase functions deploy gd-import --use-api --no-verify-jwt --project-ref "${{ secrets.SUPABASE_PROJECT_ID }}"
          supabase functions deploy gd-transfer-webhook --use-api --no-verify-jwt --project-ref "${{ secrets.SUPABASE_PROJECT_ID }}"
      - name: Verify functions respond (no more 404 blobs)
        run: |
          B=https://zfcltfqgrhytpvgqkkfo.supabase.co/functions/v1
          fail=0
          for fn in image-upload gd-import gd-transfer-webhook send-email image-webhook process-images process-pipeline extract-exif verify-gallery-password; do
            code=$(curl -s -o /dev/null -w "%{http_code}" -X OPTIONS "$B/$fn" \
              -H "Origin: https://app.imagick.ai" \
              -H "Access-Control-Request-Method: POST" \
              -H "Access-Control-Request-Headers: authorization,apikey,content-type" --max-time 20)
            echo "$fn OPTIONS=$code"
            if [ "$code" != "200" ] && [ "$code" != "204" ]; then fail=1; fi
          done
          exit $fail
